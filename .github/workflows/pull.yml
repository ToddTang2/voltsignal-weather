name: weather-pull

# Open-Meteo global best_match (GFS-class) runs init at 00/06/12/18 UTC and are available ~init+4–6h.
# We pull after each cycle is available (≈ init + 5h + margin) → 05:20, 11:20, 17:20, 23:20 UTC.
# Public repo: unlimited Actions minutes + 16 GB runner — all processing here, never the app box.
on:
  schedule:
    - cron: "20 5,11,17,23 * * *"
  workflow_dispatch:            # manual run (for the gate / ad-hoc)

concurrency:
  group: weather-pull
  cancel-in-progress: false     # idempotent upsert, but avoid overlapping runs

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python features.py            # self-check the vendored derivations match the documented values
      - name: Pull + upsert weather features
        env:
          WEATHER_DB_URL: ${{ secrets.WEATHER_DB_URL }}   # scoped write-only Supabase credential
          PUBLISH_LATENCY_HOURS: "5"
        run: python pull.py
